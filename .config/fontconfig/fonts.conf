<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">

<fontconfig>

	<alias>
		<family>serif</family>
		<prefer>
			<family>Nimbus Roman</family>
			<family>Noto Serif</family>
			<family>Liberation Serif</family>
			<family>DejaVu Serif</family>
			<family>Noto Color Emoji</family>
		</prefer>
	</alias>

	<alias>
		<family>sans-serif</family>
		<prefer>
			<family>Ubuntu Nerd Font</family>
			<family>Overpass Nerd Font</family>
			<family>Noto Sans</family>
			<family>Liberation Sans</family>
			<family>DejaVu Sans</family>
			<family>Noto Color Emoji</family>
		</prefer>
	</alias>

	<alias>
		<family>sans</family>
		<prefer>
			<family>Ubuntu Nerd Font</family>
			<family>Overpass Nerd Font</family>
			<family>Noto Sans</family>
			<family>Liberation Sans</family>
			<family>DejaVu Sans</family>
			<family>Noto Color Emoji</family>
		</prefer>
	</alias>

	<alias>
		<family>monospace</family>
		<prefer>
			<family>FiraCode Nerd Font Mono</family>  <!-- Arch -->
			<family>Fira Code Nerd Font Mono</family>  <!-- Ubuntu -->
			<family>FiraCode Nerd Font</family>  <!-- Arch -->
			<family>Fira Code Nerd Font</family>  <!-- Ubuntu -->
			<family>Noto Sans Mono</family>
			<family>DejaVu Sans Mono</family>
			<family>Terminus</family>
			<family>Noto Color Emoji</family>
		</prefer>
	</alias>

</fontconfig>
