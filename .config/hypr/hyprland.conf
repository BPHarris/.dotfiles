autogenerated = 0
monitor=,preferred,auto,1


source = ~/.config/theme/colours/hyprland.conf


# ENVIRONMENT VARS
# ================
env = XDG_CURRENT_DESKTOP,Hyprland

# Gtk theme
env = GTK_THEME,Orchis-Black-Green-Dark-Compact

# Qt theme
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_STYLE_OVERRIDE,kvantum
env = QT_QPA_PLATFORMTHEME,qt5ct
# env = QT_QPA_PLATFORMTHEME,gtk3

# Other theming
env = XCURSOR_SIZE,24
env = ICON_THEME,Luv


# START UP
# ========
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE XDG_SESSION_TYPE

exec-once = /usr/lib/xdg-desktop-portal-hyprland

# Authenticator
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Trigger user hyprland systemd service
# Which in turn have a dependency tree of auto start programs
# E.g. gnome-keyring -> nextcloud
#      mullvad-vpn   ^
exec-once = systemctl --user start hyprland-session.target

# Set shell / bar
exec-once = waybar

# Notifications
# Handled by shell
exec-once = mako

# Bluetooth
exec-once = blueman-applet

# Wallpaper
exec-once = hyprpaper

# Idle handling (suspend on inactivity)
exec-once = hypridle

exec-once = foot --server


# WINDOW MANAGER CONFIG
# =====================
general {
	gaps_in = 4
	gaps_out = 8

	border_size = 1

	col.active_border = rgb($col_bright_white)
	col.inactive_border = rgb($col_black)

	layout = master

	resize_on_border = true
	extend_border_grab_area = 25
	hover_icon_on_border = true

	allow_tearing = false

	snap {
		enabled = true
		window_gap = 10
		monitor_gap = 10
		border_overlap = true
	}
}

decoration {
	rounding = 4

	active_opacity = 1.0
	inactive_opacity = 1.0
	fullscreen_opacity = 1.0

	blur {
		enabled = false
		size = 3
		passes = 1
	}

	shadow {
		enabled = true
		range = 8
		render_power = 2
		color = rgb(161616)
	}

	dim_inactive = true
	dim_strength = 0.1
	dim_special = 0.1
}

animations {
	enabled = true

	bezier = overshot, 0.05, 0.9, 0.1, 1.025
	bezier = subtle_overshot, 0.05, 0.9, 0.1, 1.015

	# Window create / close
	animation = windows, 1, 3, overshot
	animation = windowsOut, 1, 3, overshot

	# Border colour change
	# "borderangle" is for gradient borders
	animation = border, 1, 5, default
	animation = borderangle, 1, 5, default

	# Opacity change
	animation = fade, 1, 3, default

	# Switch workspaces
	animation = workspaces, 1, 3, subtle_overshot

	# Show special workspace (scratchpad)
	animation = specialWorkspace, 1, 3, subtle_overshot, slidefadevert +50%

	# Pop-ups, launcher, etc
	animation = layersIn, 1, 2, default
	animation = layersOut, 1, 1, default
}

input {
	kb_layout = gb
	kb_options = caps:swapescape

	follow_mouse = 1

	sensitivity = 0.3
	accel_profile = flat

	follow_mouse = 2

	touchpad {
		disable_while_typing = true
		natural_scroll = true
	}
}

device {
	name = dll0945:00-06cb:cde6-touchpad

	accel_profile = adaptive
	sensitivity = 0.2
}

gestures {
	workspace_swipe_forever = true
}

group {

}

misc {
	# Disable the anime girl default background.
	# When left enabled this flashes quickly while quickshell is loading, which is
	# annoying, disabling results in a dark grey screen instead which transitions nicer.
	disable_hyprland_logo = true
	disable_splash_rendering = true
	force_default_wallpaper = 0

	# Global font setting
	# Includes hyprland error notification
	font_family = "FiraCode Nerd Font Mono:style=Regular:size=14"

	# Window focus will always follow the cursor during drag-and-drop
	# This is nice when follow_mouse != 1
	always_follow_on_dnd = true

	# Window swallowing
	# This might not be working :(
	enable_swallow = true
	swallow_regex = ^(Alacritty|alacritty|com\.mitchellh\.ghostty|org\.wezfurlong\.wezterm|foot|footclient)$

	focus_on_activate = true

	# When in fullscreen a new tiled window will cause us to exit fullscreen
	# new_window_takes_over_fullscreen = 2

	# Windows (and all children) will open on the workspace they are invoked on
	initial_workspace_tracking = 2

	middle_click_paste = false

	# Enable VFR
	# I don't know what this is but the docs say it's good for battery life
	# It's enabled by default but might as well be explicit
	vfr = true
}

binds {
	allow_workspace_cycles = true
	workspace_back_and_forth = false
	hide_special_on_workspace_change = true
}

cursor {
	no_warps = true
	# persistent_warps = true
	warp_on_change_workspace = 2
	warp_on_toggle_special = 2
}

ecosystem {
	no_donation_nag = true
}

# Layout configuration
dwindle {
	pseudotile = yes
	preserve_split = yes
}
master {
	new_status = master
	smart_resizing = false
}


# TWEAKS / FIXES
# ==============
# Smart gaps for non-special workspaces
# I.e. disable gaps when this is the only window and in fullscreen
# For special workspaces we use gaps to centre the window
workspace = w[tv1]s[false], gapsout:0, gapsin:0
workspace = f[1]s[false], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]s[false]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]s[false]
windowrule = border_size 0, match:float 0, match:workspace f[1]s[false]
windowrule = rounding 0, match:float 0, match:workspace f[1]s[false]


# Fix steam
env = STEAM_USE_DYNAMIC_VRS,1


# KEY BINDS
# =========
$mod = super

# Application exec helpers
$terminal = foot
$spawn = footclient
$emoji_picker = rofimoji --selector fuzzel --action print type copy


# Spawns
bind = $mod, return, exec, $terminal
bind = $mod, s, toggleswallow
bind = $mod, p, exec, pkill fuzzel || fuzzel
bind = $mod, e, exec, $emoji_picker


# WM Controls
bind = $mod shift, Q, killactive,
bind = $mod shift, R, exec, pkill -f '/usr/bin/gjs -m /run/.*/\w+-ags.js' && hyprpanel
bind = $mod shift alt, Q, exit,

bind = $mod shift, l, exec, loginctl lock-session
# bind = ctrl alt, delete, exec, wlogout -b 4  # Need to setup in shell
bind = $mod alt, h, exec, systemctl hibernate

bind = $mod, v, togglefloating,
bind = $mod shift, f, fullscreen

binde = $mod, j, layoutmsg, cyclenext  # might break on dwindle
binde = $mod, k, layoutmsg, cycleprev  # might break on dwindle
bind  = $mod, h, splitratio, -0.05
bind  = $mod, l, splitratio, +0.05

binde = $mod, left,  movefocus, l
binde = $mod, up,    movefocus, u
binde = $mod, down,  movefocus, d
binde = $mod, right, movefocus, r

# WM Controls: master layout
bind = $mod, space, layoutmsg, swapwithmaster child, focuswindow, master

bind = $mod alt, j, layoutmsg, rollprev
bind = $mod alt, k, layoutmsg, rollnext

binde = $mod alt, space, layoutmsg, orientationcycle
bind  = $mod alt, c,     layoutmsg, orientationcenter
bind  = $mod alt, l,     layoutmsg, orientationleft
bind  = $mod alt, r,     layoutmsg, orientationright
bind  = $mod alt, t,     layoutmsg, orientationtop
bind  = $mod alt, b,     layoutmsg, orientationbottom

# WM Controls: workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod shift, 1, movetoworkspace, 1
bind = $mod shift, 2, movetoworkspace, 2
bind = $mod shift, 3, movetoworkspace, 3
bind = $mod shift, 4, movetoworkspace, 4
bind = $mod shift, 5, movetoworkspace, 5
bind = $mod shift, 6, movetoworkspace, 6
bind = $mod shift, 7, movetoworkspace, 7
bind = $mod shift, 8, movetoworkspace, 8
bind = $mod shift, 9, movetoworkspace, 9
bind = $mod shift, 0, movetoworkspace, 10

bind = $mod, tab, workspace, previous


# Screenshots
$screenshot_path = $(xdg-user-dir PICTURES)/screenshots/$(date -u "+%Y-%m-%dT%H-%M-%S.png")
bind = shift, print, exec, grimblast copysave screen $screenshot_path
bind = , print, exec, grimblast copysave area $screenshot_path
bind = ctrl, print, exec, grimblast save area - | swappy -f - --output-file - | tee $screenshot_path | wl-copy


# Scratch pads
workspace = special:scratchpad_terminal, on-created-empty:[stayfocused]$terminal, gapsout:150
bind = $mod shift, s, togglespecialworkspace, scratchpad_terminal

workspace = special:scratchpad_htop, on-created-empty:$spawn htop, gapsout:150
bind = $mod shift, h, togglespecialworkspace, scratchpad_htop

workspace = special:scratchpad_btop, on-created-empty:$spawn btop, gapsout:150
bind = $mod shift, b, togglespecialworkspace, scratchpad_btop

workspace = special:scratchpad_keepassxc, on-created-empty:keepassxc, gapsout:150
bind = $mod shift, k, togglespecialworkspace, scratchpad_keepassxc


# Media controls
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next

binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-


# Mouse controls
bind = $mod, mouse_up, workspace, e+1
bind = $mod, mouse_down, workspace, e-1

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow


# Gestures
gesture = 3, horizontal, workspace

